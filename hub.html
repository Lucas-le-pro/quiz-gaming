<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LamaaGames</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline { color: #666; font-size: 0.95rem; margin-bottom: 50px; letter-spacing: 1px; }

    .card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card h2 { font-size: 1.2rem; color: #ccc; font-weight: 500; text-align: center; }

    .langues { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .langue-btn {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .langue-btn:hover { border-color: #7c3aed; color: #fff; }
    .langue-btn.selected { border-color: #a855f7; background: #1a0a2e; color: #fff; }

    button.main {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button.main:hover { opacity: 0.9; }
    button.main:active { transform: scale(0.98); }
    button.main:disabled { opacity: 0.4; cursor: not-allowed; }

    input {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 18px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
      width: 100%;
    }

    input:focus { border-color: #7c3aed; }
    input::placeholder { color: #444; }

    .message { text-align: center; font-size: 0.9rem; min-height: 20px; color: #888; }
    .message.success { color: #4ade80; }
    .message.error { color: #f87171; }

    .step { display: none; flex-direction: column; gap: 20px; }
    .step.active { display: flex; }

    /* NOTIFICATION */
    #notif-invite {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      padding: 14px 20px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      z-index: 999;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    #notif-invite.active { display: flex; }

    .notif-btn { padding: 6px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .notif-btn.accept { background: #fff; color: #7c3aed; }
    .notif-btn.refuse { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: #fff; }

    /* HUB */
    #hub { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 700px; gap: 20px; padding: 20px; }
    #hub.active { display: flex; }

    .hub-profil {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .hub-pseudo { font-size: 1.3rem; font-weight: 700; }
    .hub-tag { color: #666; font-size: 0.85rem; }

    .hub-section {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hub-section h3 { color: #ccc; font-size: 1rem; }

    .invite-row { display: flex; gap: 10px; }
    .invite-row input { flex: 1; }
    .invite-row button { padding: 14px 20px; white-space: nowrap; }

    .ami-item {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border 0.2s;
    }

    .ami-item:hover { border-color: #7c3aed; }
    .ami-item span { color: #888; font-size: 0.8rem; }

    /* JEUX EN ATTENTE */
    .jeu-attente-card {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border 0.2s;
      position: relative;
    }

    .jeu-attente-card:hover { border-color: #7c3aed; }
    .jeu-attente-card.en-ligne { cursor: pointer; border-color: #a855f7; }
    .jeu-attente-card.en-ligne:hover { border-color: #fff; }
    .jeu-attente-nom { font-weight: 700; font-size: 1rem; }
    .jeu-attente-desc { color: #888; font-size: 0.85rem; }
    .jeu-attente-par { color: #a855f7; font-size: 0.8rem; }
    .jeu-attente-badge {
      font-size: 0.75rem;
      color: #888;
      background: #1a1a2a;
      padding: 3px 8px;
      border-radius: 20px;
      align-self: flex-start;
    }
    .jeu-attente-badge.live { color: #4ade80; background: #0a2a1a; }

    .btn-trois-points {
      position: absolute;
      top: 10px; right: 12px;
      background: none;
      border: none;
      color: #666;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .btn-trois-points:hover { background: #2a2a3a; color: #fff; }

    /* MODAL URL */
    #url-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 800;
      align-items: center;
      justify-content: center;
    }
    #url-overlay.active { display: flex; }
    .url-card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .url-card h3 { color: #ccc; font-size: 1rem; }
    .url-fermer { color: #666; font-size: 0.85rem; cursor: pointer; text-align: center; }
    .url-fermer:hover { color: #fff; }

    textarea {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      width: 100%;
      font-family: inherit;
      transition: border 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }

    /* JEUX */
    .jeux-grille {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .jeu-card {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
    }

    .jeu-nom { font-weight: 700; font-size: 1rem; color: #fff; }
    .jeu-badge {
      font-size: 0.75rem;
      color: #a855f7;
      background: #1a0a2e;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #a855f7;
    }

    /* PROFIL AMI */
    #profil-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 800;
      align-items: center;
      justify-content: center;
    }

    #profil-overlay.active { display: flex; }

    .profil-card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 40px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .profil-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
    }

    .profil-pseudo { font-size: 1.4rem; font-weight: 700; }
    .profil-tag { color: #666; font-size: 0.85rem; }
    .profil-fermer {
      margin-top: 8px;
      padding: 10px 24px;
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .profil-fermer:hover { border-color: #7c3aed; color: #fff; }

    .profil-stats { width: 100%; display: flex; flex-direction: column; gap: 8px; }

    .stat-jeu {
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 12px 14px;
      text-align: left;
    }

    .stat-jeu-nom { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .stat-jeu-temps { color: #a855f7; font-size: 0.8rem; margin-bottom: 6px; }
    .stat-jeu-details { color: #888; font-size: 0.8rem; line-height: 1.6; }
    .profil-aucun-stat { color: #555; font-size: 0.85rem; text-align: center; }

    /* CHAT */
    #chat-panel {
      position: fixed;
      bottom: 0; right: 20px;
      width: 320px;
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      display: none;
      flex-direction: column;
      z-index: 500;
    }

    #chat-panel.active { display: flex; }

    .chat-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border-radius: 12px 12px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
    }

    .chat-header .close { cursor: pointer; font-size: 1.1rem; }

    .chat-messages {
      height: 220px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg { font-size: 0.85rem; line-height: 1.4; }
    .chat-msg .nom { font-weight: 700; color: #a855f7; margin-right: 6px; }
    .chat-msg.moi .nom { color: #6366f1; }

    .chat-input-row { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #2a2a3a; }
    .chat-input-row input { flex: 1; padding: 8px 12px; font-size: 0.9rem; }
    .chat-input-row button { padding: 8px 14px; font-size: 0.85rem; }
  </style>
</head>
<body>

  <!-- NOTIFICATION D'INVITATION -->
  <div id="notif-invite">
    <span id="notif-texte"></span>
    <button class="notif-btn accept" id="notif-accepter">Accepter</button>
    <button class="notif-btn refuse" id="notif-refuser">Refuser</button>
  </div>

  <!-- ONBOARDING -->
  <div id="onboarding">
    <div class="logo">LamaaGames</div>
    <p class="tagline" id="tagline">Bienvenue !</p>

    <div class="card">
      <div class="step active" id="step-langue">
        <h2>Quelle est ta langue ?</h2>
        <div class="langues">
          <div class="langue-btn" data-lang="fr">Français</div>
          <div class="langue-btn" data-lang="en">English</div>
          <div class="langue-btn" data-lang="es">Español</div>
          <div class="langue-btn" data-lang="de">Deutsch</div>
        </div>
        <button class="main" id="btn-langue" disabled>Choisir</button>
      </div>

      <div class="step" id="step-bienvenue">
        <h2 id="welcome-title">Bienvenue !</h2>
        <p id="welcome-sub" style="text-align:center; color:#888;"></p>
        <button class="main" id="btn-entrer">Entrer dans LamaaGames</button>
      </div>
    </div>
  </div>

  <!-- HUB -->
  <div id="hub">
    <div class="logo">LamaaGames</div>

    <div class="hub-profil">
      <div>
        <div class="hub-pseudo" id="hub-pseudo"></div>
        <div class="hub-tag">LamaaGames</div>
      </div>
    </div>

    <div class="hub-section">
      <h3>Inviter un ami</h3>
      <div class="invite-row">
        <input type="text" id="input-ami" placeholder="Pseudo de ton ami" maxlength="20">
        <button class="main" id="btn-inviter">Inviter</button>
      </div>
      <p class="message" id="msg-inviter"></p>

      <h3 style="margin-top:8px;">Mes amis</h3>
      <div id="amis-liste">
        <p style="color:#555; font-size:0.85rem;">Aucun ami pour l'instant.</p>
      </div>
    </div>

    <!-- JEUX EN ATTENTE -->
    <div class="hub-section">
      <h3>Jeux en attente</h3>
      <input type="text" id="jeu-nom" placeholder="Nom du jeu" maxlength="40">
      <textarea id="jeu-desc" placeholder="Description (facultatif)" rows="2"></textarea>
      <button class="main" id="btn-proposer">Proposer un jeu</button>
      <p class="message" id="msg-jeu"></p>
      <div id="jeux-liste">
        <p style="color:#555; font-size:0.85rem;">Aucun jeu proposé pour l'instant.</p>
      </div>
    </div>

  </div>

  <!-- MODAL URL -->
  <div id="url-overlay">
    <div class="url-card">
      <h3 id="url-titre">Mettre en ligne</h3>
      <input type="url" id="url-input" placeholder="https://ton-jeu.com">
      <button class="main" id="url-valider">Mettre en ligne</button>
      <div class="url-fermer" id="url-fermer">Annuler</div>
    </div>
  </div>

  <!-- PROFIL AMI -->
  <div id="profil-overlay">
    <div class="profil-card">
      <div class="profil-avatar" id="profil-avatar"></div>
      <div class="profil-pseudo" id="profil-pseudo"></div>
      <div class="profil-tag">LamaaGames</div>
      <div class="profil-stats" id="profil-stats"></div>
      <button class="main" id="profil-chat" style="width:100%;">Ouvrir le chat</button>
      <div class="profil-fermer" id="profil-fermer">Fermer</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-panel">
    <div class="chat-header" id="chat-header">
      <span id="chat-titre">Chat</span>
      <span class="close" id="chat-close">✕</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Message...">
      <button class="main" id="chat-envoyer">Envoyer</button>
    </div>
  </div>

  <script>
    const SERVER = 'https://lamaa-games.onrender.com';
    const params = new URLSearchParams(window.location.search);
    const pseudo = params.get('pseudo') || 'Joueur';
    const invitePseudo = params.get('invite_from') || null;

    document.getElementById('tagline').textContent = pseudo;

    const socket = io(SERVER);
    let amiActif = null;

    socket.on('connect', () => socket.emit('rejoindre', pseudo));

    // Invitation en temps réel
    socket.on('invitation', ({ de }) => afficherNotif(de));

    // Ami accepté
    socket.on('ami-accepte', () => chargerAmis());

    // Nouveau message
    socket.on('nouveau-message', ({ avec, msg }) => {
      if (avec === amiActif) afficherMessage(msg);
    });

    // ---- LANGUE ----
    let selectedLang = null;
    const traductions = {
      fr: { bienvenue: `Bienvenue, ${pseudo} !`, sub: 'Tu es bien arrivé sur LamaaGames.', btn: 'Entrer dans LamaaGames' },
      en: { bienvenue: `Welcome, ${pseudo}!`, sub: 'You made it to LamaaGames.', btn: 'Enter LamaaGames' },
      es: { bienvenue: `¡Bienvenido, ${pseudo}!`, sub: 'Ya estás en LamaaGames.', btn: 'Entrar en LamaaGames' },
      de: { bienvenue: `Willkommen, ${pseudo}!`, sub: 'Du bist bei LamaaGames angekommen.', btn: 'LamaaGames betreten' },
    };

    document.querySelectorAll('.langue-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.langue-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLang = btn.dataset.lang;
        document.getElementById('btn-langue').disabled = false;
      });
    });

    document.getElementById('btn-langue').addEventListener('click', () => {
      const t = traductions[selectedLang];
      document.getElementById('welcome-title').textContent = t.bienvenue;
      document.getElementById('welcome-sub').textContent = t.sub;
      document.getElementById('btn-entrer').textContent = t.btn;
      document.getElementById('step-langue').classList.remove('active');
      document.getElementById('step-bienvenue').classList.add('active');
    });

    document.getElementById('btn-entrer').addEventListener('click', () => {
      document.getElementById('onboarding').style.display = 'none';
      document.getElementById('hub').classList.add('active');
      document.getElementById('hub-pseudo').textContent = pseudo;
      chargerAmis();
      chargerJeux();
      if (invitePseudo) verifierInvitation(invitePseudo);
    });

    // ---- INVITATION ----
    function afficherNotif(de) {
      document.getElementById('notif-texte').textContent = `${de} vous invite à devenir ami`;
      document.getElementById('notif-invite').classList.add('active');

      document.getElementById('notif-accepter').onclick = async () => {
        await fetch(`${SERVER}/accepter`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pseudo, ami: de })
        });
        document.getElementById('notif-invite').classList.remove('active');
        chargerAmis();
      };

      document.getElementById('notif-refuser').onclick = async () => {
        await fetch(`${SERVER}/refuser`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pseudo, ami: de })
        });
        document.getElementById('notif-invite').classList.remove('active');
      };
    }

    async function verifierInvitation(de) {
      afficherNotif(de);
    }

    // ---- AMIS ----
    async function chargerAmis() {
      const res = await fetch(`${SERVER}/amis/${pseudo}`);
      const amis = await res.json();
      const liste = document.getElementById('amis-liste');

      if (amis.length === 0) {
        liste.innerHTML = '<p style="color:#555; font-size:0.85rem;">Aucun ami pour l\'instant.</p>';
      } else {
        liste.innerHTML = amis.map(a => `
          <div class="ami-item" onclick="ouvrirProfil('${a}')">
            <strong>${a}</strong>
            <span>Voir le profil</span>
          </div>
        `).join('');
      }
    }

    // ---- INVITER ----
    document.getElementById('btn-inviter').addEventListener('click', async () => {
      const ami = document.getElementById('input-ami').value.trim();
      const msg = document.getElementById('msg-inviter');

      if (!ami || ami.length < 2) { msg.textContent = 'Entre un pseudo valide.'; msg.className = 'message error'; return; }
      if (ami.toLowerCase() === pseudo.toLowerCase()) { msg.textContent = 'Tu ne peux pas t\'inviter toi-même.'; msg.className = 'message error'; return; }

      await fetch(`${SERVER}/inviter`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ de: pseudo, a: ami })
      });

      msg.textContent = `Invitation envoyée à ${ami} !`;
      msg.className = 'message success';
      document.getElementById('input-ami').value = '';
    });

    document.getElementById('input-ami').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-inviter').click();
    });

    // ---- JEUX EN ATTENTE ----
    async function chargerJeux() {
      const res = await fetch(`${SERVER}/jeux`);
      const jeux = await res.json();
      afficherJeux(jeux);
    }

    let jeuEnCoursId = null;

    function afficherJeux(jeux) {
      const liste = document.getElementById('jeux-liste');
      if (jeux.length === 0) {
        liste.innerHTML = '<p style="color:#555; font-size:0.85rem;">Aucun jeu proposé pour l\'instant.</p>';
        return;
      }
      liste.innerHTML = jeux.map(j => {
        const estCreateur = j.proposePar === pseudo;
        const estEnLigne = !!j.url;
        return `
          <div class="jeu-attente-card ${estEnLigne ? 'en-ligne' : ''}" id="jeu-${j.id}"
            ${estEnLigne ? `onclick="window.open('${j.url}', '_blank')"` : `onclick="ouvrirProfil('${j.proposePar}')"`}>
            ${estCreateur && !estEnLigne ? `<button class="btn-trois-points" onclick="event.stopPropagation(); ouvrirUrlModal('${j.id}', '${j.nom}')">···</button>` : ''}
            <div class="jeu-attente-nom">${j.nom}</div>
            ${j.description ? `<div class="jeu-attente-desc">${j.description}</div>` : ''}
            <div class="jeu-attente-par">Proposé par ${j.proposePar}</div>
            <div class="jeu-attente-badge ${estEnLigne ? 'live' : ''}">${estEnLigne ? 'En ligne' : 'En attente'}</div>
          </div>
        `;
      }).join('');
    }

    socket.on('nouveau-jeu', () => chargerJeux());
    socket.on('jeu-mis-en-ligne', () => chargerJeux());

    // Modal URL
    function ouvrirUrlModal(id, nom) {
      jeuEnCoursId = id;
      document.getElementById('url-titre').textContent = `Mettre "${nom}" en ligne`;
      document.getElementById('url-input').value = '';
      document.getElementById('url-overlay').classList.add('active');
    }

    document.getElementById('url-fermer').addEventListener('click', () => {
      document.getElementById('url-overlay').classList.remove('active');
    });

    document.getElementById('url-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('url-overlay'))
        document.getElementById('url-overlay').classList.remove('active');
    });

    document.getElementById('url-valider').addEventListener('click', async () => {
      const url = document.getElementById('url-input').value.trim();
      if (!url || !url.startsWith('http')) {
        document.getElementById('url-input').style.borderColor = '#f87171';
        return;
      }
      await fetch(`${SERVER}/jeux/url`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: jeuEnCoursId, pseudo, url })
      });
      document.getElementById('url-overlay').classList.remove('active');
      chargerJeux();
    });

    document.getElementById('btn-proposer').addEventListener('click', async () => {
      const nom = document.getElementById('jeu-nom').value.trim();
      const description = document.getElementById('jeu-desc').value.trim();
      const msg = document.getElementById('msg-jeu');

      if (!nom) { msg.textContent = 'Entre un nom de jeu.'; msg.className = 'message error'; return; }

      await fetch(`${SERVER}/jeux`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, description, proposePar: pseudo })
      });

      msg.textContent = 'Jeu proposé !';
      msg.className = 'message success';
      document.getElementById('jeu-nom').value = '';
      document.getElementById('jeu-desc').value = '';
      chargerJeux();
    });


    // ---- PROFIL AMI ----
    async function ouvrirProfil(ami) {
      document.getElementById('profil-pseudo').textContent = ami;
      document.getElementById('profil-avatar').textContent = ami[0].toUpperCase();
      document.getElementById('profil-stats').innerHTML = '<p class="profil-aucun-stat">Chargement...</p>';
      document.getElementById('profil-overlay').classList.add('active');

      // Charger les stats
      try {
        const res = await fetch(`${SERVER}/stats/${ami}`);
        const statsJoueur = await res.json();
        const statsDiv = document.getElementById('profil-stats');

        if (statsJoueur.length === 0) {
          statsDiv.innerHTML = '<p class="profil-aucun-stat">Aucun jeu joué pour l\'instant.</p>';
        } else {
          statsDiv.innerHTML = statsJoueur.map(s => {
            const minutes = Math.floor((s.tempsJoue || 0) / 60);
            const details = Object.entries(s)
              .filter(([k]) => !['jeu', 'tempsJoue'].includes(k))
              .map(([k, v]) => `${k} : ${v}`)
              .join(' · ');
            return `
              <div class="stat-jeu">
                <div class="stat-jeu-nom">${s.jeu}</div>
                <div class="stat-jeu-temps">${minutes} min jouées</div>
                ${details ? `<div class="stat-jeu-details">${details}</div>` : ''}
              </div>
            `;
          }).join('');
        }
      } catch(e) {
        document.getElementById('profil-stats').innerHTML = '<p class="profil-aucun-stat">Impossible de charger les stats.</p>';
      }

      document.getElementById('profil-chat').onclick = () => {
        document.getElementById('profil-overlay').classList.remove('active');
        ouvrirChat(ami);
      };
    }

    document.getElementById('profil-fermer').addEventListener('click', () => {
      document.getElementById('profil-overlay').classList.remove('active');
    });

    // Fermer en cliquant dehors
    document.getElementById('profil-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('profil-overlay'))
        document.getElementById('profil-overlay').classList.remove('active');
    });

    // ---- CHAT ----
    function ouvrirChat(ami) {
      amiActif = ami;
      document.getElementById('chat-titre').textContent = ami;
      document.getElementById('chat-panel').classList.add('active');
      document.getElementById('chat-messages').innerHTML = '';
      chargerMessages(ami);
    }

    document.getElementById('chat-close').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.remove('active');
      amiActif = null;
    });

    async function chargerMessages(ami) {
      const res = await fetch(`${SERVER}/messages/${pseudo}/${ami}`);
      const msgs = await res.json();
      msgs.forEach(afficherMessage);
    }

    function afficherMessage(msg) {
      const div = document.createElement('div');
      div.className = 'chat-msg' + (msg.de === pseudo ? ' moi' : '');
      div.innerHTML = `<span class="nom">${msg.de}</span>${msg.texte}`;
      document.getElementById('chat-messages').appendChild(div);
      document.getElementById('chat-messages').scrollTop = 9999;
    }

    document.getElementById('chat-envoyer').addEventListener('click', () => {
      const texte = document.getElementById('chat-input').value.trim();
      if (!texte || !amiActif) return;
      socket.emit('message', { de: pseudo, a: amiActif, texte });
      document.getElementById('chat-input').value = '';
    });

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('chat-envoyer').click();
    });
  </script>

</body>
</html>
