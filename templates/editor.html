<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ project.name }} - Game Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { background: #1a1a2e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .nav-logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #6060ff, #ff60b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        #project-title { background: none; border: 1px solid transparent; color: #fff; font-size: 15px; font-weight: 600; padding: 4px 10px; border-radius: 6px; outline: none; }
        #project-title:focus { border-color: #6060ff; background: #0d0d1a; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 7px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-save { background: #6060ff; color: #fff; }
        .btn-download { background: #2a2a4a; color: #aaa; }
        .btn-download:hover { color: #fff; }
        .toggle-public { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; }
        .toggle-public input { cursor: pointer; }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #2a2a4a; }
        #monaco-editor { flex: 1; }
        .ai-pane { width: 320px; display: flex; flex-direction: column; background: #111122; }
        .ai-header { padding: 14px 16px; border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
        .ai-header h3 { font-size: 14px; }
        .ai-limit { font-size: 12px; color: #666; }
        .ai-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 13px; border-radius: 10px; font-size: 13px; line-height: 1.6; max-width: 95%; }
        .msg.user { background: #252550; align-self: flex-end; }
        .msg.ai { background: #1a2a1a; align-self: flex-start; white-space: pre-wrap; }
        .msg.error { background: #2a1a1a; color: #ff8080; align-self: flex-start; }
        .ai-input { padding: 12px; border-top: 1px solid #2a2a4a; display: flex; gap: 8px; }
        .ai-input textarea { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; padding: 8px 12px; outline: none; resize: none; height: 38px; font-family: inherit; }
        .ai-input textarea:focus { border-color: #6060ff; }
        .ai-input button { padding: 8px 14px; background: #6060ff; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px; }
        .saved-flash { position: fixed; bottom: 20px; right: 20px; background: #1a3a1a; color: #60ff60; padding: 10px 20px; border-radius: 8px; font-size: 14px; display: none; }
        pre code { background: #0d1a0d; display: block; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
<nav>
    <div class="nav-left">
        <div class="nav-logo" onclick="location.href='/dashboard'">🎮</div>
        <input type="text" id="project-title" value="{{ project.name }}">
        <label class="toggle-public">
            <input type="checkbox" id="is-public" {{ 'checked' if project.is_public }}> Public
        </label>
    </div>
    <div class="nav-right">
        <button class="btn btn-download" onclick="downloadCode()">⬇ Télécharger</button>
        <button class="btn btn-save" onclick="saveProject()">💾 Sauvegarder</button>
    </div>
</nav>
<div class="workspace">
    <div class="editor-pane">
        <div id="monaco-editor"></div>
    </div>
    <div class="ai-pane">
        <div class="ai-header">
            <h3>🤖 IA - Assistant code</h3>
            <span class="ai-limit" id="ai-limit">{{ 45 - user.ai_messages_count }}/45 restants</span>
        </div>
        <div class="ai-messages" id="ai-messages">
            <div class="msg ai">Salut ! Je suis ton assistant. Décris ce que tu veux coder et je t'aide !</div>
        </div>
        <div class="ai-input">
            <textarea id="ai-input" placeholder="Demande quelque chose..." rows="1"></textarea>
            <button onclick="sendAI()">➤</button>
        </div>
    </div>
</div>
<div class="saved-flash" id="saved-flash">✓ Sauvegardé</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
let editor;
const projectId = {{ project.id }};
const initialCode = {{ project.code | tojson }};

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function() {
    editor = monaco.editor.create(document.getElementById('monaco-editor'), {
        value: initialCode,
        language: 'javascript',
        theme: 'vs-dark',
        fontSize: 14,
        minimap: { enabled: false },
        automaticLayout: true,
        scrollBeyondLastLine: false,
        wordWrap: 'on'
    });
});

async function saveProject() {
    const res = await fetch('/project/' + projectId + '/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            code: editor.getValue(),
            name: document.getElementById('project-title').value,
            is_public: document.getElementById('is-public').checked
        })
    });
    if ((await res.json()).ok) {
        const flash = document.getElementById('saved-flash');
        flash.style.display = 'block';
        setTimeout(() => flash.style.display = 'none', 2000);
    }
}

function downloadCode() {
    const blob = new Blob([editor.getValue()], { type: 'text/javascript' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = document.getElementById('project-title').value.replace(/\s+/g, '_') + '.js';
    a.click();
}

async function sendAI() {
    const input = document.getElementById('ai-input');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';

    const msgs = document.getElementById('ai-messages');
    msgs.innerHTML += `<div class="msg user">${escapeHtml(message)}</div>`;
    msgs.innerHTML += `<div class="msg ai" id="typing">...</div>`;
    msgs.scrollTop = msgs.scrollHeight;

    const res = await fetch('/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, code: editor.getValue() })
    });
    const data = await res.json();
    document.getElementById('typing').remove();

    if (data.error) {
        msgs.innerHTML += `<div class="msg error">${escapeHtml(data.error)}</div>`;
    } else {
        const formatted = formatAIResponse(data.response);
        msgs.innerHTML += `<div class="msg ai">${formatted}</div>`;
        document.getElementById('ai-limit').textContent = data.remaining + '/45 restants';
    }
    msgs.scrollTop = msgs.scrollHeight;
}

function formatAIResponse(text) {
    return escapeHtml(text).replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
}

function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('ai-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAI(); }
});

// Autosave toutes les 30s
setInterval(saveProject, 30000);
</script>
</body>
</html>
