<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Explorer - Game Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        nav { background: #1a1a2e; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a4a; }
        .nav-logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #6060ff, #ff60b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-right { display: flex; gap: 16px; align-items: center; }
        .nav-right a { color: #aaa; text-decoration: none; font-size: 14px; }
        .nav-right a:hover { color: #fff; }
        .main { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        h2 { font-size: 24px; margin-bottom: 30px; }
        .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .project-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color 0.2s; }
        .project-card:hover { border-color: #6060ff; }
        .project-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .project-meta { font-size: 12px; color: #666; display: flex; justify-content: space-between; }
        .empty { text-align: center; padding: 60px; color: #444; }
    </style>
</head>
<body>
<nav>
    <div class="nav-logo" onclick="location.href='/dashboard'">🎮 Game Studio</div>
    <div class="nav-right">
        <a href="/dashboard">Mes projets</a>
        <a href="/logout">Déconnexion</a>
    </div>
</nav>
<div class="main">
    <h2>🌍 Projets publics</h2>
    {% if projects %}
    <div class="projects">
        {% for p in projects %}
        <div class="project-card" onclick="location.href='/project/{{ p.id }}'">
            <div class="project-name">{{ p.name }}</div>
            <div class="project-meta">
                <span>par {{ p.owner.username }}</span>
                <span>{{ p.updated_at.strftime('%d/%m/%Y') }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty">
        <div style="font-size:48px">🌍</div>
        <p style="margin-top:10px">Aucun projet public pour l'instant.</p>
    </div>
    {% endif %}
</div>
</body>
</html>
