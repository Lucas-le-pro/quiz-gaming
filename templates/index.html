<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Game Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 420px; }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo h1 { font-size: 36px; background: linear-gradient(135deg, #6060ff, #ff60b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { color: #666; margin-top: 6px; font-size: 14px; }
        .form-box { background: #1a1a2e; border-radius: 16px; padding: 36px; border: 1px solid #2a2a4a; }
        .form-box h2 { font-size: 18px; margin-bottom: 6px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 14px; background: #0d0d1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #6060ff; }
        button { width: 100%; padding: 13px; background: linear-gradient(135deg, #6060ff, #ff60b0); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .error { color: #ff6060; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>Game Studio</h1>
        <p>Crée, code et partage tes jeux</p>
    </div>
    <div class="form-box">
        <h2>Connexion / Inscription</h2>
        <p class="subtitle">Entre ton email et ton pseudo — on t'envoie un code.</p>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ton@email.com" autofocus>
        </div>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="MonPseudo">
        </div>
        <button onclick="start()">Recevoir le code</button>
        <p class="error" id="error-msg"></p>
    </div>
</div>
<script>
async function start() {
    const email = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    if (!email || !username) return;

    const res = await fetch('/auth/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, username })
    });
    const data = await res.json();
    if (data.ok) {
        location.href = '/verify';
    } else {
        const e = document.getElementById('error-msg');
        e.textContent = data.error;
        e.style.display = 'block';
    }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') start(); });
</script>
</body>
</html>
